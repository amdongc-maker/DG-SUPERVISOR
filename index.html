<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Operator DG Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  box-sizing:border-box;
  font-size:14px;
}
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  }
  #loginBox{

max-width:420px;

margin:70px auto;

padding:25px;

border-radius:20px;

background:white;

box-shadow:0 8px 25px rgba(0,0,0,.15);

}
body{font-family:Segoe UI;background:#f1f5f9;margin:0}
header{background:#2563eb;color:#fff;padding:15px;font-weight:700;font-size:18px}
.container{max-width:950px;margin:auto;padding:14px}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
input,textarea{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:1px solid #ddd;font-size:14px}
.hidden{display:none}
.profile{background:#eff6ff;border-left:5px solid #2563eb}
.time-box{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.history-card{background:#ecfdf5;border-left:5px solid #16a34a}
.save-btn,
.cancel-btn{
    width:85px;
    height:40px;
    padding:4px 8px;
    border:none;
    border-radius:8px;
    color:#fff;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    margin:0 auto;
    display:block;
    line-height:16px;
}
.wellTable textarea{
    width:100%;
    height:55px;
    margin:0;
    resize:vertical;
    box-sizing:border-box;
}
.save-btn{
    background:#16a34a;
}

.cancel-btn{
    background:#dc2626;
}
.well-details p{margin:3px 0;font-size:14px}
.time-box label{
  font-size:14px;
  font-weight:600;
  color:#1f2937;
  margin-bottom:6px;
}
.wellTable{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    table-layout:fixed;
}

.wellTable th,
.wellTable td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
    vertical-align:middle;
}

.wellTable th{
    background:#2563eb;
    color:#fff;
}
.wellTable input{
    width:100%;
    margin:0;
    padding:10px;
    box-sizing:border-box;
}
.wellTable th:nth-child(1){width:4%;}
.wellTable th:nth-child(2){width:8%;}
.wellTable th:nth-child(3){width:22%;}
.wellTable th:nth-child(4){width:22%;}
.wellTable th:nth-child(5){width:20%;}
.wellTable th:nth-child(6){width:12%;}
.wellTable th:nth-child(7){width:12%;}
.section{
    margin-top:20px;
    margin-bottom:8px;
    font-size:18px;
    font-weight:bold;
    color:#000;
    text-align:left;
    border-bottom:2px solid #000;
    padding-bottom:4px;
}
.well-card{

background:#ffffff;

border:1px solid #dbeafe;

border-radius:16px;

padding:14px;

margin-top:15px;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.well-head{

display:flex;

justify-content:space-between;

align-items:center;

background:#2563eb;

color:#fff;

padding:10px;

border-radius:10px;

font-size:15px;

font-weight:bold;

margin-bottom:12px;

}

.field{

margin-top:12px;

}

.field label{

display:block;

font-weight:600;

font-size:14px;

margin-bottom:5px;

color:#1f2937;

}

.field input,
.field textarea{

width:100%;

padding:12px;

border-radius:10px;

border:1px solid #cbd5e1;

font-size:14px;

box-sizing:border-box;

}

.field textarea{

height:70px;

resize:none;

}

.btn-row{

display:flex;

gap:10px;

margin-top:15px;

}

.btn-row button{

flex:1;

height:45px;

border-radius:10px;

font-size:14px;

font-weight:bold;

}
.history-card{

background:#ffffff;

border-radius:16px;

padding:16px;

margin-bottom:18px;

box-shadow:0 3px 12px rgba(0,0,0,.08);

border-left:5px solid #16a34a;

}

.history-well{

background:#f8fafc;

border:1px solid #dbeafe;

border-radius:12px;

padding:12px;

margin-top:12px;

}

.history-title{

background:#16a34a;

color:#fff;

padding:8px 12px;

border-radius:8px;

font-weight:bold;

margin-bottom:10px;

}

.history-row{

display:flex;

justify-content:space-between;

align-items:center;

padding:8px 0;

border-bottom:1px dashed #d1d5db;

font-size:14px;

}

.history-row:last-child{

border-bottom:none;

}

.history-row span:first-child{

font-weight:600;

color:#374151;

}

.history-row span:last-child{

font-weight:700;

text-align:Center;

}
header{
    position:relative;
    height:70px;
    background:linear-gradient(135deg,#1d4ed8,#2563eb,#3b82f6);
    display:flex;
    justify-content:left;
    align-items:left;
    color:#fff;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.header-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:18px;
    font-weight:700;
    max-width:70%;
}
.header-icon{
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

#logoutBtn{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    width:72px;
    height:36px;
    margin:0;
    padding:0;
    font-size:13px;
    border-radius:18px;
    background:#ef4444;
    color:#fff;
}
#logoutBtn:hover{
    background:#dc2626;
}

@media(max-width:600px){

.header-title{
    font-size:17px;
}

.header-icon{
    width:36px;
    height:36px;
    font-size:18px;
}

#logoutBtn{
    padding:7px 12px;
    font-size:12px;
}

}
/* Modern Processing Overlay */
#loadingOverlay{
position:fixed;
inset:0;
background:rgba(15,23,42,.75);
backdrop-filter:blur(4px);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.loaderBox{
background:#fff;
padding:30px;
border-radius:20px;
text-align:center;
width:280px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.spinner{
width:60px;
height:60px;
margin:auto;
border:6px solid #e5e7eb;
border-top:6px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

.loaderText{
margin-top:18px;
font-size:17px;
font-weight:bold;
color:#2563eb;
}

.loaderSub{
margin-top:8px;
font-size:13px;
color:#666;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}
</style>
</head>

<body>
<header>

<div class="header-title">

<div class="header-icon">⚡</div>

<div>
SUPERVISOR DG PANEL
</div>

</div>

<button
id="logoutBtn"
onclick="logout()"
style="display:none;">
Logout
</button>

</header>

<div class="container">

<div id="loginBox" class="card">
<h3>Supervisor Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button style="background:#2563eb;color:#fff" onclick="login()">LOGIN</button>
<div id="msg" style="color:red;margin-top:8px"></div>
</div>

<div id="mainBox" class="hidden">
<div id="profileBox" class="card profile"></div>

<div class="card">
<h3>🟡 Assigned Wells</h3>
<div id="wellData">Loading...</div>
</div>

<div class="card">
<h3>📜 DG History</h3>
<div id="historyData">Loading...</div>
</div>
</div>
</div>

<script>
function formatDate(val){
  if(!val || val === "NA") return "NA";

  let d = new Date(val);

  if(isNaN(d.getTime())) return "NA";

  return d.toLocaleDateString("en-GB"); // 23/03/2026
}
function formatDateTime(val){

  if(!val || val=="NA") return "NA";

  const d = new Date(val);

  if(isNaN(d.getTime())) return "NA";

  return d.toLocaleString("en-GB",{
      timeZone:"Asia/Kolkata",
      day:"2-digit",
      month:"2-digit",
      year:"numeric",
      hour:"2-digit",
      minute:"2-digit",
      hour12:false
  }) + " Hrs";
}
const WEBAPP_URL="https://script.google.com/macros/s/AKfycbzkAbliBCybsBRvQbhF5ysIk0iBBK8F8F_ndWWRtVB3hWFNseoornI75PhpZpc_93RzdQ/exec";

let CURRENT_OPERATOR=null;

/* LOGIN */
async function login(){

  const res = await fetch(
    WEBAPP_URL +
    "?action=operatorLogin" +
    "&username=" + encodeURIComponent(user.value) +
    "&password=" + encodeURIComponent(pass.value)
  );

  const js = await res.json();

  if(!js.success){
    msg.innerHTML="Invalid Login";
    return;
  }

  CURRENT_OPERATOR = js;
  localStorage.setItem("DG_OPERATOR_LOGIN", JSON.stringify(js));

  loginBox.classList.add("hidden");
  mainBox.classList.remove("hidden");
document.getElementById("logoutBtn").style.display="block";
  profileBox.innerHTML=`
  
  <b>Welcome :</b> ${js.name}<br>
  <b>Company :</b> ${js.company}<br>
  <b>Mobile :</b> ${js.mobile}`;

  refresh();

}

/* LOAD PENDING */
async function loadPending(){
 try{
   const res = await fetch(
     WEBAPP_URL+"?action=operatorPending&mobile="+encodeURIComponent(CURRENT_OPERATOR.mobile.trim())
   );

   const data = await res.json();

   if(!data || !data.length){
     wellData.innerHTML="No Active Wells";
     return;
   }

   let html="";
   let requests = {};

data.forEach(w=>{

  if(!requests[w.requestId]){

    requests[w.requestId]={
      requestId:w.requestId,
      installation:w.installation,
      feeder:w.feeder,
      requester:w.requester,
      requesterMobile:w.requesterMobile,
      shutdownDate:w.shutdownDate,
      wells:[]
    };

  }

  requests[w.requestId].wells.push(w);

});

   Object.values(requests).forEach(req=>{

let rows="";

req.wells.forEach((w,index)=>{

rows += `

<div class="well-card">

<div class="well-head">
<span>Well ${index+1}</span>
<b>${w.well}</b>
</div>

<div class="field">
<label>DG Start Time</label>
<input type="datetime-local" id="start_${w.rowId}">
</div>

<div class="field">
<label>DG Stop Time</label>
<input type="datetime-local" id="stop_${w.rowId}">
</div>

<div class="field">
<label>Remarks</label>
<textarea
id="remark_${w.rowId}"
placeholder="Enter Remarks"></textarea>
</div>

<div class="btn-row">

<button
class="save-btn"
id="save_${w.rowId}"
onclick="localSave(${w.rowId})">
💾 SAVE
</button>

<button
id="cancel_${w.rowId}"
class="cancel-btn"
onclick="showCancelBox(${w.rowId},event)">
❌ CANCEL
</button>

</div>

</div>

`;
});

html+=`

<div class="card">

<h3>DG Deployment Request</h3>

<p><b>Request ID :</b> ${req.requestId}</p>

<p><b>Installation :</b> ${req.installation}</p>

<p><b>Feeder :</b> ${req.feeder}</p>

<p><b>Shutdown Date :</b> ${formatDate(req.shutdownDate)}</p>

<p><b>Requester :</b> ${req.requester}</p>

<p><b>Mobile :</b> ${req.requesterMobile}</p>

<table class="wellTable">

${rows}

</table>

</div>

`;

});

   wellData.innerHTML=html;

 }catch(err){
   console.error(err);
   wellData.innerHTML="❌ Failed to load active wells";
 }
}

/* SAVE */
async function localSave(rowId){

 const btn = document.getElementById("save_"+rowId);

 try{

   btn.disabled=true;

btn.innerHTML="⏳ Saving...";


   let s=document.getElementById("start_"+rowId).value;
let e=document.getElementById("stop_"+rowId).value;

let remark=document.getElementById("remark_"+rowId).value.trim();

if(remark=="") remark="NIL";

   if(!s || !e){alert("Enter Start & Stop Time");throw "err";}
   if(new Date(e)<=new Date(s)){alert("Invalid Time");throw "err";}

   const res = await fetch(
     WEBAPP_URL+
     "?action=operatorFinalSubmit"+
     "&rowId="+rowId+
     "&start="+encodeURIComponent(s)+
     "&stop="+encodeURIComponent(e)+
     "&remark="+encodeURIComponent(remark)
   );

   const js = await res.json();

   if(js.status==="success"){
    sparkBlast();   // ✨ Spark Animation

    btn.innerHTML="✅ Saved";

    hideLoading();

    speak("Congratulations. DG Entry Submitted Successfully.");

    setTimeout(function(){

        alert("DG Entry Saved Successfully.");

        refresh();

    },500);

    return;

}else{

    throw "fail";

}

 }catch(err){

    hideLoading();

    btn.disabled=false;

    btn.innerHTML="💾 Save";

    speak("Sorry. Save failed.");

    alert("❌ Save Failed");

}
}

/* CANCEL */
function showCancelBox(rowId, e){

  const remarkBox = document.getElementById("remark_"+rowId);
  const startBox  = document.getElementById("start_"+rowId);
  const stopBox   = document.getElementById("stop_"+rowId);
  const saveBtn   = document.getElementById("save_"+rowId);
  const cancelBtn = e.target;

  remarkBox.classList.remove("hidden");
  if(remarkBox.value.trim()==""){
    remarkBox.value = "Cancel DG";
}

  startBox.style.display = "none";
  stopBox.style.display = "none";
  saveBtn.style.display = "none";

  cancelBtn.innerText = "⚠ Confirm Cancel";

  cancelBtn.onclick = function(){
    confirmCancel(rowId);
  };
}

async function confirmCancel(rowId){

  let remark = document.getElementById("remark_"+rowId).value;

  remark = remark.trim();

if(remark==""){
    alert("Cancel DG ke liye Remarks compulsory hai.");
    document.getElementById("remark_"+rowId).focus();
    return;
}
const btn=document.getElementById("cancel_"+rowId);

btn.disabled=true;

btn.innerHTML="⏳ Cancelling...";
showLoading("Cancelling DG...");
speak("Please wait. Cancelling DG request.");
  try{

    const res = await fetch(
      WEBAPP_URL+
      "?action=operatorCancel"+
      "&rowId="+rowId+
      "&remark="+encodeURIComponent(remark)
    );

    const txt = await res.text();

    if(txt==="CANCELLED"){
     btn.innerHTML="✅ Cancelled";
     hideLoading();
speak("DG request cancelled successfully.");

setTimeout(function(){

alert("DG Cancelled Successfully.");

refresh();

},600);
    }else{
      throw "fail";
    }

  }catch(err){

    hideLoading();

    speak("Cancel failed.");

    alert("❌ Cancel Failed");

}
}

/* HISTORY */
async function loadHistory(){
 try{
   const res = await fetch(
     WEBAPP_URL+"?action=operatorHistory&mobile="+encodeURIComponent(CURRENT_OPERATOR.mobile.trim())
   );
   const data = await res.json();

   if(!data || !data.length){
     historyData.innerHTML="No History";
     return;
   }

   let html="";
   data.reverse().forEach(req=>{

let rows="";

req.wells.forEach((w,index)=>{

rows += `

<div class="history-well">

<div class="history-title">
Well ${index+1} : <b>${w.well}</b>
</div>

<div class="history-row">
<span>🟢 Start</span>
<span>${formatDateTime(w.dgStart)}</span>
</div>

<div class="history-row">
<span>🔴 Stop</span>
<span>${formatDateTime(w.dgStop)}</span>
</div>

<div class="history-row">
<span>⏱ Total Hrs</span>
<span>${w.total}</span>
</div>

</div>

`;

});

html += `

<div class="card history-card">

<h3>DG Deployment Request</h3>

<p><b>Request ID :</b> ${req.requestId}</p>

<p><b>Installation :</b> ${req.installation}</p>

<p><b>Feeder :</b> ${req.feeder}</p>

<p><b>Shutdown Date :</b> ${formatDate(req.shutdownDate)}</p>

<p><b>Requester :</b> ${req.requester}</p>

<p><b>Mobile :</b> ${req.requesterMobile}</p>

${rows}

</div>

`;

});
   historyData.innerHTML=html;

 }catch(err){
   console.error(err);
   historyData.innerHTML="❌ Failed to load history";
 }
}

function refresh(){
 loadPending();
 loadHistory();
}

function showLoading(message){

document.querySelector(".loaderText").innerHTML=message;

document.getElementById("loadingOverlay").style.display="flex";

}

function hideLoading(){

document.getElementById("loadingOverlay").style.display="none";

}

function speak(text){

if(!('speechSynthesis' in window)) return;

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(text);

msg.lang="en-IN";

msg.rate=1;

msg.pitch=1;

speechSynthesis.speak(msg);

}
function sparkBlast(){

  const duration = 1000;
  const end = Date.now() + duration;

  (function frame(){

    confetti({
      particleCount: 8,
      angle: 60,
      spread: 80,
      origin: { x: 0 },
      colors: [
        "#ff0000",
        "#00ff00",
        "#00bfff",
        "#ffff00",
        "#ff00ff",
        "#ffffff",
        "#ff8800"
      ]
    });

    confetti({
      particleCount: 8,
      angle: 120,
      spread: 80,
      origin: { x: 1 },
      colors: [
        "#ff0000",
        "#00ff00",
        "#00bfff",
        "#ffff00",
        "#ff00ff",
        "#ffffff",
        "#ff8800"
      ]
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }

  })();
}
function logout(){
localStorage.removeItem("DG_OPERATOR_LOGIN");
CURRENT_OPERATOR=null;

user.value="";
pass.value="";
msg.innerHTML="";

loginBox.classList.remove("hidden");
mainBox.classList.add("hidden");

wellData.innerHTML="";
historyData.innerHTML="";
profileBox.innerHTML="";

document.getElementById("logoutBtn").style.display="none";

}
window.onload = function () {

  const saved = localStorage.getItem("DG_OPERATOR_LOGIN");

  if (saved) {

    CURRENT_OPERATOR = JSON.parse(saved);

    loginBox.classList.add("hidden");
    mainBox.classList.remove("hidden");

    document.getElementById("logoutBtn").style.display = "block";

    profileBox.innerHTML = `
      <b>Welcome :</b> ${CURRENT_OPERATOR.name}<br>
      <b>Company :</b> ${CURRENT_OPERATOR.company}<br>
      <b>Mobile :</b> ${CURRENT_OPERATOR.mobile}
    `;

    refresh();
  }

};
</script>
<div id="loadingOverlay">
<div class="loaderBox">

<div class="spinner"></div>

<div class="loaderText">
Submitting...
</div>

<div class="loaderSub">
Please wait while data is saving
</div>

</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</body>
</html>
